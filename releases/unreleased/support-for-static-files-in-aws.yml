---
title: Support for static files in AWS
category: added
author: Eva Millán <evamillan@bitergia.com>
issue: null
notes: >
  Static files can now be uploaded to Amazon Web Services's (AWS)
  Simple Storage Service (S3).
  The storage requires the following environment variables:
  `SORTINGHAT_STATICFILES_STORAGE=aws`
  `SORTINGHAT_BUCKET_NAME=<bucket>`
  The AWS credentials can be specified using `AWS_S3_ACCESS_KEY_ID`,
  `AWS_S3_SECRET_ACCESS_KEY` and `AWS_SESSION_TOKEN`.
